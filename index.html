<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#07131f" />
<title>Stargate: Galactic Dominion — v0.2</title>
<style>
:root{--bg:#06101a;--panel:#0d1b28;--panel2:#122638;--line:#2f5872;--text:#eaf6ff;--muted:#93b2c7;--accent:#56d6ff;--gold:#ffd66b;--danger:#ff6d7a;--ok:#6ff0a7;--race:#56d6ff}
*{box-sizing:border-box}body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:radial-gradient(circle at top,#12334c 0,#06101a 45%);color:var(--text);min-height:100vh}
header{position:sticky;top:0;z-index:5;background:rgba(6,16,26,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line);padding:10px 12px}.title{font-weight:800;letter-spacing:.08em;color:var(--accent);font-size:15px}.sub{font-size:12px;color:var(--muted)}
.resources{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:8px}.res{background:#0b1c2a;border:1px solid #23465d;border-radius:10px;padding:7px;text-align:center}.res b{display:block;font-size:13px}.res span{font-size:10px;color:var(--muted)}
main{padding:12px 12px 88px;max-width:1050px;margin:auto}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(245px,1fr));gap:10px}.card{background:linear-gradient(180deg,rgba(18,38,56,.98),rgba(10,26,39,.98));border:1px solid #28516a;border-radius:14px;padding:12px;box-shadow:0 8px 24px #0005}.card h3{margin:0 0 8px;font-size:16px}.card p{margin:5px 0;color:var(--muted);font-size:12px}.row{display:flex;justify-content:space-between;gap:8px;align-items:center;margin:8px 0}.badge{font-size:11px;padding:3px 7px;border-radius:999px;background:#17354a;color:var(--accent)}button{border:0;border-radius:10px;padding:9px 10px;background:linear-gradient(180deg,#2b91bc,#17617f);color:#fff;font-weight:700;cursor:pointer}button:disabled{opacity:.38}.danger{background:linear-gradient(180deg,#b84b5b,#772c38)}.ok{background:linear-gradient(180deg,#2e9c69,#1b6846)}
.tabs{position:fixed;bottom:0;left:0;right:0;display:grid;grid-template-columns:repeat(6,1fr);background:#07131ff5;border-top:1px solid var(--line);padding:6px env(safe-area-inset-right) calc(6px + env(safe-area-inset-bottom)) env(safe-area-inset-left);z-index:6}.tab{padding:8px 2px;background:transparent;color:var(--muted);font-size:11px}.tab.active{color:var(--accent);background:#112a3c}.section{display:none}.section.active{display:block}.progress{height:8px;background:#06111b;border-radius:99px;overflow:hidden;border:1px solid #28495d}.progress>div{height:100%;background:linear-gradient(90deg,var(--race),#62edff)}
.log{height:250px;overflow:auto;background:#07131f;border:1px solid #24485f;border-radius:12px;padding:10px;font-size:12px}.log div{margin-bottom:8px;border-bottom:1px dashed #1c3b50;padding-bottom:6px}.ai{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.small{font-size:11px;color:var(--muted)}.hero{padding:18px;border-radius:16px;background:linear-gradient(135deg,#0b2437,#183d57);border:1px solid var(--race);margin-bottom:10px}.hero h2{margin:0;color:var(--gold)}
.modal{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.88);display:flex;align-items:flex-start;justify-content:center;padding:18px;overflow:auto}.modal.hidden{display:none}.creator{width:min(760px,100%);margin:auto;background:linear-gradient(180deg,#10283b,#081522);border:1px solid #4b7893;border-radius:20px;padding:18px;box-shadow:0 20px 70px #000}.creator h1{margin:0;color:#72ddff}.creator h2{font-size:16px;margin:18px 0 8px}.choices{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}.choice{background:#0c2030;border:1px solid #284e65;border-radius:12px;padding:10px;cursor:pointer;min-height:76px}.choice.selected{border-color:var(--gold);box-shadow:0 0 0 2px #ffd66b33}.choice b{display:block}.choice span{display:block;font-size:11px;color:var(--muted);margin-top:4px}input,select{width:100%;background:#07131f;color:#fff;border:1px solid #315a72;border-radius:10px;padding:10px;font-size:16px}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.summary{margin-top:14px;padding:12px;background:#07131f;border:1px solid #284b60;border-radius:12px}.version{font-size:10px;color:#6e93a8;float:right}
@media(max-width:650px){.resources{grid-template-columns:repeat(3,1fr)}.tabs{grid-template-columns:repeat(3,1fr);row-gap:2px}.tab{font-size:10px;padding:6px}.card{padding:10px}.formgrid{grid-template-columns:1fr}.creator{padding:14px}.choices{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div id="newGame" class="modal hidden"><div class="creator"><span class="version">VERSION 0.2</span><h1>Nouvelle puissance galactique</h1><p class="small">Choisissez votre origine. Chaque race possède un bonus permanent et des factions différentes.</p><h2>1. Galaxie d’origine</h2><div id="galaxyChoices" class="choices"></div><h2>2. Race</h2><div id="raceChoices" class="choices"></div><h2>3. Faction</h2><div id="factionChoices" class="choices"></div><h2>4. Identité de l’empire</h2><div class="formgrid"><label>Nom du dirigeant<input id="leaderInput" value="Baltasard" maxlength="30"></label><label>Nom de l’empire<input id="empireInput" value="Dominion de Haven" maxlength="40"></label><label>Planète mère<input id="planetInput" value="Haven" maxlength="30"></label><label>Doctrine<select id="doctrineInput"><option>Militaire</option><option>Scientifique</option><option>Diplomatique</option><option>Économique</option><option>Exploration</option></select></label></div><div id="creationSummary" class="summary"></div><div class="row"><button class="danger" onclick="cancelCreator()">Annuler</button><button class="ok" onclick="startGame()">Commencer la partie</button></div></div></div>
<header><div class="title">STARGATE: GALACTIC DOMINION <span class="version">v0.2</span></div><div class="sub" id="status"></div><div class="resources" id="resources"></div></header>
<main><section id="overview" class="section active"></section><section id="buildings" class="section"></section><section id="research" class="section"></section><section id="fleet" class="section"></section><section id="galaxy" class="section"></section><section id="reports" class="section"></section></main>
<nav class="tabs"><button class="tab active" data-tab="overview">Commandement</button><button class="tab" data-tab="buildings">Bâtiments</button><button class="tab" data-tab="research">Recherches</button><button class="tab" data-tab="fleet">Flotte</button><button class="tab" data-tab="galaxy">Galaxie</button><button class="tab" data-tab="reports">Rapports</button></nav>
<script>
const $=s=>document.querySelector(s),fmt=n=>Math.floor(n).toLocaleString('fr-FR'),clone=o=>JSON.parse(JSON.stringify(o));
const galaxies={milky:{name:'Voie Lactée',desc:'Réseau de Portes très développé.',bonus:'Expéditions SG +10%'},pegasus:{name:'Pégase',desc:'Monde dangereux dominé par les Wraith.',bonus:'Naquadah +12%'},ida:{name:'Ida',desc:'Ancien territoire des Asgards.',bonus:'Boucliers +15%'},ori:{name:'Galaxie des Ori',desc:'Région isolée et hostile.',bonus:'Énergie +15%'}};
const races={
 tauri:{name:'Tau’ri',icon:'🌍',color:'#56d6ff',desc:'Polyvalents et inventifs.',bonus:'Recherches 15% moins chères',mods:{research:.85,build:1,ship:1,prod:1}},
 ancient:{name:'Lantiens / Anciens',icon:'🏛️',color:'#71f1cf',desc:'Technologie supérieure mais coûteuse.',bonus:'Puissance des vaisseaux +25%',mods:{research:1.1,build:1.12,ship:1.15,power:1.25}},
 goauld:{name:'Goa’uld',icon:'🐍',color:'#ffd66b',desc:'Empire fondé sur la conquête.',bonus:'Bâtiments 12% moins chers',mods:{research:1,build:.88,ship:1,power:1.05}},
 wraith:{name:'Wraith',icon:'🦇',color:'#7de06f',desc:'Prédateurs de la galaxie de Pégase.',bonus:'Population +30%',mods:{research:1,build:1,ship:.92,pop:1.3}},
 asgard:{name:'Asgards',icon:'🔷',color:'#9cbcff',desc:'Science, téléportation et boucliers.',bonus:'Boucliers et recherches +20%',mods:{research:.8,build:1.05,ship:1.08,shield:1.2}},
 replicator:{name:'Réplicateurs',icon:'🤖',color:'#d7d7d7',desc:'Expansion rapide et implacable.',bonus:'Production +20%',mods:{research:.9,build:.95,ship:.9,prod:1.2}},
 ori:{name:'Ori',icon:'☀️',color:'#ff9b58',desc:'Puissance énergétique et influence.',bonus:'Énergie +30%',mods:{research:1,build:1,ship:1,energy:1.3}},
 lucian:{name:'Alliance Lucienne',icon:'⚔️',color:'#e092ff',desc:'Commerce, espionnage et opportunisme.',bonus:'Butin des raids +25%',mods:{research:1,build:.96,ship:.95,loot:1.25}}
};
const factions={
 tauri:['Commandement de la Terre','Expédition Atlantis','Base Icare','Coalition planétaire'],ancient:['Conseil de Lantia','Expédition des Anciens','Cité dissidente'],goauld:['Empire d’Apophis','Empire de Ba’al','Empire d’Anubis','Seigneur indépendant'],wraith:['Grande Ruche','Alliance des Reines','Ruche indépendante'],asgard:['Haut Conseil d’Ida','Flotte de Thor','Colonie survivante'],replicator:['Collectif mécanique','Essaim humanoïde','Noyau autonome'],ori:['Armée des Oris','Prieuré de Célestis','Croisade indépendante'],lucian:['Syndicat Lucien','Maison marchande','Flotte corsaire']};
const base={version:2,created:false,last:Date.now(),profile:{galaxy:'milky',race:'tauri',faction:'Commandement de la Terre',leader:'Baltasard',empire:'Dominion de Haven',planet:'Haven',doctrine:'Militaire'},res:{metal:1200,crystal:700,naq:300,energy:100,pop:800},build:{mine:1,crystal:1,naq:1,solar:1,lab:0,shipyard:0,gate:0,bunker:0},research:{weapons:0,shield:0,hyper:0,gate:0,sensors:0},fleet:{f302:0,bc304:0,probe:0,sgteam:1},turn:1,score:0,logs:[],ais:[{name:'Seigneur Apophis',race:'Goa’uld',power:180,att:'agressive'},{name:'Collectif Wraith',race:'Wraith',power:230,att:'prédateur'},{name:'Alliance Lucienne',race:'Humain',power:140,att:'opportuniste'},{name:'Asgards d’Ida',race:'Asgard',power:300,att:'diplomatique'}]};
let g=load(),draft={galaxy:'milky',race:'tauri'};
const items={mine:{n:'Extracteur de minerai',d:'Produit le métal nécessaire aux structures.',base:{metal:120,crystal:40},mult:1.55},crystal:{n:'Raffinerie de cristal',d:'Produit les cristaux technologiques.',base:{metal:100,crystal:80},mult:1.58},naq:{n:'Mine de naquadah',d:'Ressource rare pour la Porte et les vaisseaux.',base:{metal:220,crystal:160,naq:30},mult:1.7},solar:{n:'Centrale énergétique',d:'Augmente l’énergie disponible.',base:{metal:150,crystal:60},mult:1.6},lab:{n:'Laboratoire scientifique',d:'Débloque les recherches avancées.',base:{metal:350,crystal:250,naq:50},mult:1.75},shipyard:{n:'Chantier spatial',d:'Permet de construire des vaisseaux.',base:{metal:500,crystal:350,naq:80},mult:1.8},gate:{n:'Complexe Porte des étoiles',d:'Autorise les expéditions SG.',base:{metal:700,crystal:500,naq:250},mult:1.9},bunker:{n:'Bastion planétaire',d:'Protège la planète contre les raids.',base:{metal:400,crystal:200,naq:60},mult:1.72}};
const tech={weapons:{n:'Armes énergétiques',base:{metal:200,crystal:260,naq:40},req:['lab',1]},shield:{n:'Boucliers',base:{metal:180,crystal:300,naq:50},req:['lab',1]},hyper:{n:'Hyperpropulsion',base:{metal:350,crystal:450,naq:120},req:['lab',2]},gate:{n:'Maîtrise des Portes',base:{metal:300,crystal:380,naq:160},req:['gate',1]},sensors:{n:'Capteurs longue portée',base:{metal:160,crystal:240,naq:30},req:['lab',1]}};
const ships={probe:{n:'Sonde de reconnaissance',cost:{metal:100,crystal:180,naq:10},req:['shipyard',1],power:5},f302:{n:'Chasseur léger',cost:{metal:450,crystal:260,naq:40},req:['shipyard',1],power:40},bc304:{n:'Vaisseau capital',cost:{metal:5000,crystal:3200,naq:900},req:['shipyard',3],power:700},sgteam:{n:'Équipe d’exploration',cost:{metal:180,crystal:120,naq:20},req:['gate',1],power:25}};
function load(){try{const old=JSON.parse(localStorage.getItem('sggd')||'null');if(!old)return clone(base);const merged=Object.assign(clone(base),old);merged.profile=Object.assign(clone(base.profile),old.profile||{});merged.version=2;merged.created=!!old.created;return merged}catch(e){return clone(base)}}
function save(){g.last=Date.now();localStorage.setItem('sggd',JSON.stringify(g))}function mods(){return races[g.profile.race].mods||{}}function race(){return races[g.profile.race]}
function prod(){let m=mods(),gal=g.profile.galaxy;return {metal:(18+g.build.mine*22)*(m.prod||1),crystal:(10+g.build.crystal*14)*(m.prod||1),naq:(2+g.build.naq*5)*(m.prod||1)*(gal==='pegasus'?1.12:1),energy:(20+g.build.solar*30)*(m.energy||1)*(gal==='ori'?1.15:1),pop:2*(m.pop||1)}}
function tick(){let p=prod();g.res.metal+=p.metal/10;g.res.crystal+=p.crystal/10;g.res.naq+=p.naq/10;g.res.pop+=p.pop/10;renderHeader();save()}
function cost(basec,lvl,m=1.6,type='build'){let c={},mod=type==='research'?(mods().research||1):type==='ship'?(mods().ship||1):(mods().build||1);for(let k in basec)c[k]=Math.floor(basec[k]*Math.pow(m,lvl)*mod);return c}function can(c){return Object.entries(c).every(([k,v])=>g.res[k]>=v)}function pay(c){for(let k in c)g.res[k]-=c[k]}function ctext(c){return Object.entries(c).map(([k,v])=>`${fmt(v)} ${({metal:'métal',crystal:'cristal',naq:'naquadah'})[k]}`).join(' · ')}function log(t){g.logs.unshift(`[Cycle ${g.turn}] ${t}`);g.logs=g.logs.slice(0,120)}
function build(k){let i=items[k],c=cost(i.base,g.build[k],i.mult,'build');if(!can(c))return;pay(c);g.build[k]++;g.score+=g.build[k]*10;log(`${i.n} passe niveau ${g.build[k]}.`);render()}function research(k){let i=tech[k];if(g.build[i.req[0]]<i.req[1])return;let c=cost(i.base,g.research[k],1.85,'research');if(!can(c))return;pay(c);g.research[k]++;g.score+=g.research[k]*18;log(`Recherche ${i.n} niveau ${g.research[k]} terminée.`);render()}function ship(k){let s=ships[k],c=cost(s.cost,0,1,'ship');if(g.build[s.req[0]]<s.req[1]||!can(c))return;pay(c);g.fleet[k]++;g.score+=s.power;log(`${s.n} construit.`);render()}
function power(){let m=mods(),v=g.fleet.f302*40+g.fleet.bc304*700+g.fleet.probe*5+g.fleet.sgteam*25+g.build.bunker*100+g.research.weapons*50+g.research.shield*45*(m.shield||1);return Math.floor(v*(m.power||1))}
function nextTurn(){g.turn++;let p=prod();for(let k of ['metal','crystal','naq'])g.res[k]+=p[k]*60;g.res.pop+=120*(mods().pop||1);g.ais.forEach(a=>{a.power+=Math.floor(15+Math.random()*55);if(Math.random()<.18&&a.att!=='diplomatique'){let atk=Math.floor(a.power*.25),def=power();if(atk>def){let loss=Math.min(g.res.metal*.12,800);g.res.metal-=loss;log(`${a.name} lance un raid et vole ${fmt(loss)} métal.`)}else log(`Raid de ${a.name} repoussé par les défenses de ${g.profile.planet}.`)}});log('Cycle galactique avancé : production encaissée et empires rivaux mis à jour.');render()}
function expedition(){if(g.build.gate<1||g.fleet.sgteam<1)return;let r=Math.random(),bonus=g.profile.galaxy==='milky'?1.1:1;if(r<.55){let loot={metal:Math.floor((300+Math.random()*900)*bonus),crystal:Math.floor((150+Math.random()*500)*bonus),naq:Math.floor((20+Math.random()*150)*bonus)};for(let k in loot)g.res[k]+=loot[k];log(`Expédition réussie : ${ctext(loot)} récupérés.`)}else if(r<.85){g.score+=120;log('L’équipe découvre une civilisation neutre et gagne du prestige.')}else{g.fleet.sgteam=Math.max(0,g.fleet.sgteam-1);log('Expédition catastrophique : une équipe est portée disparue.')}render()}
function attack(i){let a=g.ais[i],mine=power(),enemy=a.power;if(g.fleet.f302+g.fleet.bc304<1)return;if(mine*(.75+Math.random()*.5)>enemy*(.75+Math.random()*.5)){let loot=Math.floor((250+enemy*.7)*(mods().loot||1));g.res.metal+=loot;g.res.crystal+=Math.floor(loot*.45);a.power=Math.max(20,Math.floor(a.power*.72));g.score+=200;log(`Victoire contre ${a.name}. Butin : ${fmt(loot)} métal.`)}else{g.fleet.f302=Math.floor(g.fleet.f302*.7);g.fleet.bc304=Math.floor(g.fleet.bc304*.85);log(`Défaite contre ${a.name}. Une partie de la flotte est détruite.`)}render()}
function showCreator(reset=false){draft={galaxy:g.profile.galaxy||'milky',race:g.profile.race||'tauri'};$('#leaderInput').value=g.profile.leader||'Baltasard';$('#empireInput').value=g.profile.empire||'Dominion de Haven';$('#planetInput').value=g.profile.planet||'Haven';$('#doctrineInput').value=g.profile.doctrine||'Militaire';$('#newGame').classList.remove('hidden');renderCreator();if(reset)$('#newGame').dataset.reset='1'}function cancelCreator(){if(!g.created)return;$('#newGame').classList.add('hidden');delete $('#newGame').dataset.reset}
function renderCreator(){$('#galaxyChoices').innerHTML=Object.entries(galaxies).map(([k,x])=>`<div class="choice ${draft.galaxy===k?'selected':''}" onclick="draft.galaxy='${k}';renderCreator()"><b>${x.name}</b><span>${x.desc}</span></div>`).join('');$('#raceChoices').innerHTML=Object.entries(races).map(([k,x])=>`<div class="choice ${draft.race===k?'selected':''}" onclick="draft.race='${k}';renderCreator()"><b>${x.icon} ${x.name}</b><span>${x.desc}</span></div>`).join('');$('#factionChoices').innerHTML=factions[draft.race].map((x,i)=>`<div class="choice ${i===0?'selected':''}" data-faction="${x.replace(/"/g,'&quot;')}" onclick="selectFaction(this)"><b>${x}</b><span>Faction ${races[draft.race].name}</span></div>`).join('');$('#creationSummary').innerHTML=`<b>${races[draft.race].icon} ${races[draft.race].name}</b> — ${galaxies[draft.galaxy].name}<br><span class="small">Bonus racial : ${races[draft.race].bonus}<br>Bonus galactique : ${galaxies[draft.galaxy].bonus}</span>`;document.documentElement.style.setProperty('--race',races[draft.race].color)}function selectFaction(el){[...$('#factionChoices').children].forEach(x=>x.classList.remove('selected'));el.classList.add('selected')}
function startGame(){let selected=$('#factionChoices .selected'),reset=$('#newGame').dataset.reset==='1';let profile={galaxy:draft.galaxy,race:draft.race,faction:selected?selected.dataset.faction:factions[draft.race][0],leader:$('#leaderInput').value.trim()||'Baltasard',empire:$('#empireInput').value.trim()||'Nouvel Empire',planet:$('#planetInput').value.trim()||'Haven',doctrine:$('#doctrineInput').value};if(reset){let fresh=clone(base);fresh.profile=profile;fresh.created=true;fresh.logs=[`[Cycle 1] Fondation de ${profile.empire} sur ${profile.planet}.`];g=fresh}else{g.profile=profile;g.created=true;log(`${profile.empire} est officiellement fondé par ${profile.leader}.`)}$('#newGame').classList.add('hidden');delete $('#newGame').dataset.reset;applyTheme();save();render()}
function applyTheme(){document.documentElement.style.setProperty('--race',race().color);document.documentElement.style.setProperty('--accent',race().color)}
function renderHeader(){let p=prod();$('#resources').innerHTML=[['metal','Métal'],['crystal','Cristal'],['naq','Naquadah'],['energy','Énergie'],['pop','Population']].map(([k,n])=>`<div class=res><b>${fmt(g.res[k])}</b><span>${n}${p[k]?` +${fmt(p[k])}/min`:''}</span></div>`).join('');$('#status').textContent=`${g.profile.planet} — ${galaxies[g.profile.galaxy].name} — Cycle ${g.turn} — Puissance ${fmt(power())}`}
function render(){applyTheme();renderHeader();let p=prod(),r=race();$('#overview').innerHTML=`<div class=hero><h2>${r.icon} ${g.profile.leader}</h2><p><b>${g.profile.empire}</b> · ${g.profile.faction} · Doctrine ${g.profile.doctrine}</p><p>${r.name} — ${r.bonus}</p><div class=row><span>Score impérial</span><b>${fmt(g.score)}</b></div><button class=ok onclick=nextTurn()>Avancer d’un cycle</button></div><div class=grid><div class=card><h3>Production</h3>${Object.entries(p).slice(0,3).map(([k,v])=>`<div class=row><span>${({metal:'Métal',crystal:'Cristal',naq:'Naquadah'})[k]}</span><b>+${fmt(v)}/min</b></div>`).join('')}</div><div class=card><h3>Forces disponibles</h3><div class=row><span>Puissance militaire</span><b>${fmt(power())}</b></div><div class=row><span>Équipes d’exploration</span><b>${g.fleet.sgteam}</b></div><button onclick=expedition() ${g.build.gate<1?'disabled':''}>Lancer une expédition</button></div><div class=card><h3>Partie</h3><p>Sauvegarde automatique sur cet appareil.</p><button onclick="save();log('Sauvegarde manuelle effectuée.');render()">Sauvegarder</button> <button onclick="showCreator(true)">Nouvelle partie</button></div></div>`;
$('#buildings').innerHTML=`<div class=grid>${Object.entries(items).map(([k,i])=>{let c=cost(i.base,g.build[k],i.mult,'build');return `<div class=card><div class=row><h3>${i.n}</h3><span class=badge>Niv. ${g.build[k]}</span></div><p>${i.d}</p><p>${ctext(c)}</p><button onclick="build('${k}')" ${can(c)?'':'disabled'}>Construire</button></div>`}).join('')}</div>`;
$('#research').innerHTML=`<div class=grid>${Object.entries(tech).map(([k,i])=>{let c=cost(i.base,g.research[k],1.85,'research'),ok=g.build[i.req[0]]>=i.req[1];return `<div class=card><div class=row><h3>${i.n}</h3><span class=badge>Niv. ${g.research[k]}</span></div><p>Pré-requis : ${items[i.req[0]].n} niveau ${i.req[1]}</p><p>${ctext(c)}</p><button onclick="research('${k}')" ${ok&&can(c)?'':'disabled'}>Rechercher</button></div>`}).join('')}</div>`;
$('#fleet').innerHTML=`<div class=grid>${Object.entries(ships).map(([k,s])=>{let c=cost(s.cost,0,1,'ship');return `<div class=card><div class=row><h3>${s.n}</h3><span class=badge>${g.fleet[k]}</span></div><p>Puissance : ${s.power} · Pré-requis : ${items[s.req[0]].n} niv. ${s.req[1]}</p><p>${ctext(c)}</p><button onclick="ship('${k}')" ${g.build[s.req[0]]>=s.req[1]&&can(c)?'':'disabled'}>Construire</button></div>`}).join('')}</div>`;
$('#galaxy').innerHTML=`<div class=grid>${g.ais.map((a,i)=>`<div class=card><div class=ai><div><h3>${a.name}</h3><div class=small>${a.race} · Doctrine : ${a.att}</div></div><span class=badge>${fmt(a.power)} puissance</span></div><div class=progress><div style="width:${Math.min(100,a.power/5)}%"></div></div><p>Rapport de force : ${power()>=a.power?'favorable':'dangereux'}</p><button class=danger onclick="attack(${i})" ${g.fleet.f302+g.fleet.bc304<1?'disabled':''}>Attaquer</button></div>`).join('')}</div>`;
$('#reports').innerHTML=`<div class=card><h3>Journal galactique</h3><div class=log>${g.logs.length?g.logs.map(x=>`<div>${x}</div>`).join(''):'<div>Aucun rapport pour le moment.</div>'}</div></div>`;save()}
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab,.section').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#'+b.dataset.tab).classList.add('active')});
applyTheme();setInterval(tick,6000);render();if(!g.created)showCreator();
</script></body></html>
