<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#071a2f">
<title>Stargate: Galactic Dominion v0.3</title>
<style>
:root{--bg:#04101d;--panel:#0a1e33;--panel2:#102a47;--line:#2b5e84;--text:#e8f7ff;--muted:#93b6cc;--accent:#59c8ff;--good:#62e3a4;--bad:#ff7c7c;--warn:#ffd36b}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 50% -20%,#163a62 0,#071827 35%,#030a12 78%);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}button,input,select{font:inherit}button{cursor:pointer}
body{padding-bottom:76px}.hidden{display:none!important}.app{max-width:1200px;margin:auto}.top{position:sticky;top:0;z-index:20;padding:10px 12px;background:rgba(3,12,22,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;justify-content:space-between;gap:10px}.title{font-weight:900;letter-spacing:.06em}.version{font-size:.72rem;color:var(--accent)}.identity{font-size:.8rem;color:var(--muted);text-align:right}
.resources{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-top:9px}.res{padding:7px 5px;border:1px solid #214d70;border-radius:9px;background:#091a2a;text-align:center}.res b{display:block;font-size:.92rem}.res small{color:var(--muted);font-size:.65rem}
main{padding:12px}.page{display:none}.page.active{display:block}.hero,.panel{border:1px solid var(--line);border-radius:14px;background:linear-gradient(145deg,rgba(15,43,72,.96),rgba(6,24,42,.96));box-shadow:0 8px 26px #0007}.hero{padding:16px;margin-bottom:12px}.hero h2{margin:0 0 6px}.hero p{margin:4px 0;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:10px}.panel{padding:12px}.panel h3{margin:0 0 10px;color:#fff}.card{border:1px solid #285879;background:#081b2d;border-radius:11px;padding:10px;margin:8px 0}.row{display:flex;justify-content:space-between;align-items:center;gap:10px}.muted{color:var(--muted);font-size:.85rem}.tag{display:inline-block;padding:2px 7px;border-radius:99px;background:#153b5b;color:#bfeaff;font-size:.72rem;margin:2px}.bar{height:7px;background:#03101b;border-radius:9px;overflow:hidden;margin-top:6px}.bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),#7dffdb)}
.btn{border:1px solid #3e81ad;border-radius:9px;background:#123a59;color:#fff;padding:8px 10px;font-weight:700}.btn:hover{filter:brightness(1.15)}.btn:disabled{opacity:.38;cursor:not-allowed}.btn.good{background:#145c49}.btn.bad{background:#642b37}.btn.warn{background:#66501f}.btn.small{padding:5px 8px;font-size:.78rem}.actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tabs{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(6,1fr);background:#061523;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}.tab{border:0;background:transparent;color:#9fc2d7;padding:10px 3px 8px;font-size:.68rem}.tab.active{color:#fff;background:#12314e}.tab span{display:block;font-size:1.2rem;margin-bottom:2px}
.modal{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.82);display:flex;align-items:center;justify-content:center;padding:14px}.modalbox{width:min(700px,100%);max-height:92vh;overflow:auto;border:1px solid #3b7aa4;border-radius:16px;background:#071a2b;padding:16px}.modalbox h1{margin:0 0 5px}.formgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.field label{display:block;color:var(--muted);font-size:.8rem;margin-bottom:4px}.field input,.field select{width:100%;padding:10px;border-radius:9px;border:1px solid #376b8e;background:#03111e;color:#fff}.raceinfo{margin:10px 0;padding:10px;border-left:4px solid var(--accent);background:#0b2943;border-radius:8px}
.galaxy{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px}.system{position:relative;min-height:120px;padding:10px;border:1px solid #285878;border-radius:12px;background:radial-gradient(circle at 70% 20%,#1d5179 0,#0a2339 35%,#061423 72%);overflow:hidden}.system:after{content:"";position:absolute;inset:0;background-image:radial-gradient(#fff 1px,transparent 1px);background-size:23px 21px;opacity:.16;pointer-events:none}.system>*{position:relative;z-index:1}.planet{font-size:1.65rem}.hostile{border-color:#8c3f50}.owned{border-color:#2f9d77}.neutral{border-color:#7a7041}.selected{outline:2px solid var(--accent)}
.log{max-height:310px;overflow:auto;font-size:.82rem}.logitem{padding:7px;border-bottom:1px solid #173852}.goodtxt{color:var(--good)}.badtxt{color:var(--bad)}.warntxt{color:var(--warn)}
@media(max-width:700px){.resources{grid-template-columns:repeat(3,1fr)}.resources .res:nth-child(4),.resources .res:nth-child(5){grid-column:auto}.formgrid{grid-template-columns:1fr}.identity{display:none}.tabs{grid-template-columns:repeat(6,1fr)}.tab{font-size:.58rem}}
</style>
</head>
<body>
<div id="creator" class="modal hidden"><div class="modalbox">
<h1>Nouvel empire</h1><p class="muted">Choisis ton origine. Chaque race possède ses propres bonus.</p>
<div class="formgrid">
<div class="field"><label>Galaxie d'origine</label><select id="newGalaxy"></select></div>
<div class="field"><label>Race</label><select id="newRace"></select></div>
<div class="field"><label>Faction</label><select id="newFaction"></select></div>
<div class="field"><label>Doctrine</label><select id="newDoctrine"><option value="militaire">Militaire</option><option value="scientifique">Scientifique</option><option value="economique">Économique</option><option value="exploration">Exploration</option><option value="diplomatique">Diplomatique</option></select></div>
<div class="field"><label>Nom du dirigeant</label><input id="newLeader" value="Baltasard"></div>
<div class="field"><label>Nom de l'empire</label><input id="newEmpire" value="Haven"></div>
<div class="field"><label>Planète mère</label><input id="newPlanet" value="Haven Prime"></div>
</div><div id="raceInfo" class="raceinfo"></div>
<button id="startGame" class="btn good" style="width:100%;padding:12px">Fonder l'empire</button>
</div></div>
<div class="app">
<header class="top"><div class="brand"><div><div class="title">STARGATE: GALACTIC DOMINION <span class="version">v0.3</span></div><div id="where" class="muted"></div></div><div id="identity" class="identity"></div></div><div id="resources" class="resources"></div></header>
<main>
<section id="overview" class="page active"></section>
<section id="buildings" class="page"></section>
<section id="research" class="page"></section>
<section id="fleet" class="page"></section>
<section id="galaxy" class="page"></section>
<section id="reports" class="page"></section>
</main>
<nav class="tabs">
<button class="tab active" data-page="overview"><span>⌂</span>Empire</button><button class="tab" data-page="buildings"><span>🏗️</span>Bâtiments</button><button class="tab" data-page="research"><span>🧪</span>Recherche</button><button class="tab" data-page="fleet"><span>🚀</span>Flotte</button><button class="tab" data-page="galaxy"><span>🌌</span>Galaxie</button><button class="tab" data-page="reports"><span>📜</span>Rapports</button>
</nav></div>
<script>
'use strict';
const SAVE='sggd_v03';
const galaxies={milky:{name:'Voie Lactée',bonus:'Portes abondantes'},pegasus:{name:'Pégase',bonus:'Artefacts anciens'},ida:{name:'Ida',bonus:'Science asgard'},ori:{name:'Galaxie des Ori',bonus:'Énergie supérieure'}};
const races={
 tauri:{name:"Tau'ri",icon:'🌍',bonus:'Recherche +15 %, construction -5 %',prod:1,research:.85,build:.95,combat:1},
 ancient:{name:'Lantiens / Anciens',icon:'🏛️',bonus:'Technologies très puissantes mais coûteuses',prod:.9,research:.75,build:1.2,combat:1.25},
 goauld:{name:"Goa'uld",icon:'🐍',bonus:'Naquadah +25 %, conquête renforcée',prod:1.15,research:1.05,build:.95,combat:1.12},
 wraith:{name:'Wraith',icon:'🦇',bonus:'Flottes rapides, population par moisson',prod:1,research:1.1,build:1,combat:1.18},
 asgard:{name:'Asgards',icon:'🔷',bonus:'Boucliers et recherche +20 %',prod:.95,research:.8,build:1.05,combat:1.2},
 replicator:{name:'Réplicateurs',icon:'🤖',bonus:'Construction +30 %, forte consommation',prod:1.15,research:.9,build:.7,combat:1.1},
 ori:{name:'Ori',icon:'☀️',bonus:'Énergie +35 %, puissance militaire',prod:1.08,research:.95,build:1,combat:1.23},
 lucian:{name:'Alliance Lucienne',icon:'⚔️',bonus:'Commerce et espionnage',prod:1.18,research:1,build:.9,combat:1.03}
};
const factions={tauri:['Commandement de la Terre','Expédition Atlantis','Base Icare','Coalition planétaire'],ancient:['Conseil lantien','Cité d’Atlantis','Colonie d’Aurora'],goauld:['Grand Maître indépendant','Empire de Râ','Empire d’Apophis','Empire d’Anubis','Empire de Ba’al'],wraith:['Ruche souveraine','Alliance des ruches','Culte des Gardiens'],asgard:['Haut Conseil d’Ida','Flotte de Thor','Colonie Vanir'],replicator:['Réseau primaire','Collectif Asuran','Essaim autonome'],ori:['Prieuré d’Origine','Croisade des Ori','Empire céleste'],lucian:['Conseil lucien','Cartel de Netan','Maison marchande indépendante']};
const buildingDefs={mine:{name:'Extracteur de minerai',icon:'⛏️',base:[120,50,0],desc:'Augmente la production de minerai.'},crystal:{name:'Raffinerie de cristal',icon:'💎',base:[100,90,0],desc:'Augmente la production de cristal.'},naq:{name:'Mine de naquadah',icon:'☢️',base:[180,140,0],desc:'Produit le naquadah nécessaire aux technologies avancées.'},power:{name:'Réacteur énergétique',icon:'⚡',base:[160,80,20],desc:'Augmente la capacité énergétique.'},lab:{name:'Laboratoire',icon:'🧪',base:[220,210,80],desc:'Accélère et débloque les recherches.'},shipyard:{name:'Chantier spatial',icon:'🏭',base:[260,180,90],desc:'Débloque les vaisseaux lourds.'},gate:{name:'Complexe de la Porte',icon:'🌀',base:[300,260,180],desc:'Permet exploration et colonisation par la Porte.'},defense:{name:'Centre de défense',icon:'🛡️',base:[240,170,100],desc:'Renforce la défense planétaire.'}};
const researchDefs={weapons:{name:'Systèmes d’armes',icon:'💥',base:[180,130,80],desc:'+10 % puissance offensive par niveau.'},shield:{name:'Boucliers',icon:'🛡️',base:[170,170,110],desc:'+10 % défense par niveau.'},hyper:{name:'Hypernavigation',icon:'🌠',base:[250,230,160],desc:'Débloque les missions lointaines.'},sensors:{name:'Capteurs',icon:'📡',base:[140,180,90],desc:'Améliore espionnage et détection.'},ancient:{name:'Technologie ancienne',icon:'🔆',base:[500,450,350],desc:'Accès aux artefacts, drones et E2PZ.'},logistics:{name:'Logistique interstellaire',icon:'📦',base:[220,190,120],desc:'Augmente le nombre de colonies.'}};
const shipDefs={probe:{name:'Sonde MALP',icon:'📡',base:[40,25,5],power:1,req:['shipyard',1]},sg:{name:'Équipe SG',icon:'🪖',base:[90,60,15],power:4,req:['gate',1]},fighter:{name:'Chasseur léger',icon:'✈️',base:[180,120,60],power:12,req:['shipyard',2]},cruiser:{name:'Croiseur',icon:'🚀',base:[900,650,400],power:75,req:['shipyard',4]},capital:{name:'Vaisseau amiral',icon:'🛸',base:[3600,2800,1800],power:360,req:['shipyard',7]}};
function fresh(){return {created:false,time:Date.now(),tick:0,player:{leader:'',empire:'',planet:'',galaxy:'milky',race:'tauri',faction:'',doctrine:'militaire'},res:{metal:1400,crystal:900,naq:350,energy:120,pop:500},buildings:{mine:1,crystal:1,naq:0,power:1,lab:0,shipyard:0,gate:1,defense:0},research:{weapons:0,shield:0,hyper:0,sensors:0,ancient:0,logistics:0},fleet:{probe:1,sg:1,fighter:0,cruiser:0,capital:0},colonies:[0],selectedSystem:0,ai:[],systems:[],logs:[]};}
let game=fresh();
const $=s=>document.querySelector(s), fmt=n=>Math.floor(n).toLocaleString('fr-FR'), clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function rng(seed){let t=seed+0x6D2B79F5;return()=>{t+=0x6D2B79F5;let x=t;x=Math.imul(x^x>>>15,x|1);x^=x+Math.imul(x^x>>>7,x|61);return((x^x>>>14)>>>0)/4294967296}}
function generateUniverse(){const r=rng(Date.now()%1000000);const names=['Abydos','Chulak','Dakara','Langara','Edora','Tollana','P3X-989','Lantea','Sateda','Genii','Asuras','Heliopolis','Delmak','Orban','Velona','Kheb','Cimmeria','Othala','Celestis','Taranis'];game.systems=[];for(let i=0;i<20;i++){const roll=r();game.systems.push({id:i,name:i===0?game.player.planet:names[i%names.length]+'-'+(Math.floor(r()*90)+10),type:i===0?'owned':roll<.3?'neutral':roll<.72?'ai':'ruin',owner:i===0?game.player.empire:null,rich:Math.round(70+r()*90),gate:r()>.25,scouted:i===0,distance:1+Math.floor(r()*12),aiId:null});}
const aiNames=['Empire de Sokar','Ruche Némésis','Collectif Asuran','Coalition Asgard','Cartel de Netan','Croisade Ori','Dominion de Ba’al','République Genii'];game.ai=aiNames.map((name,i)=>({id:i,name,race:['goauld','wraith','replicator','asgard','lucian','ori','goauld','tauri'][i],power:120+Math.floor(r()*260),economy:70+Math.floor(r()*160),aggression:.2+r()*.7,worlds:1,status:'neutre'}));let aiSystems=game.systems.filter(s=>s.type==='ai');aiSystems.forEach((s,i)=>{const a=game.ai[i%game.ai.length];s.aiId=a.id;s.owner=a.name});}
function save(){game.time=Date.now();localStorage.setItem(SAVE,JSON.stringify(game));}
function load(){try{const s=JSON.parse(localStorage.getItem(SAVE));if(s&&s.created){game=s;offlineProgress();return true}}catch(e){}return false}
function offlineProgress(){const sec=clamp((Date.now()-(game.time||Date.now()))/1000,0,21600);produce(sec);for(let i=0;i<Math.floor(sec/60);i++) aiTurn(false);log(`Progression hors ligne calculée sur ${Math.floor(sec/60)} minute(s).`,'good')}
function race(){return races[game.player.race]}
function production(){const r=race();return {metal:(4+game.buildings.mine*3.3)*r.prod,crystal:(2.5+game.buildings.crystal*2.4)*r.prod,naq:(.45+game.buildings.naq*.72)*(game.player.race==='goauld'?1.25:1),energy:game.buildings.power*16,pop:.06+game.colonies.length*.03}}
function produce(sec){const p=production();game.res.metal+=p.metal*sec;game.res.crystal+=p.crystal*sec;game.res.naq+=p.naq*sec;game.res.energy=Math.max(game.res.energy,p.energy);game.res.pop+=p.pop*sec}
function cost(base,lvl,mult=1.55){return base.map(x=>Math.floor(x*Math.pow(mult,lvl)))}
function canPay(c){return game.res.metal>=c[0]&&game.res.crystal>=c[1]&&game.res.naq>=c[2]}
function pay(c){game.res.metal-=c[0];game.res.crystal-=c[1];game.res.naq-=c[2]}
function costText(c){return `⛏️ ${fmt(c[0])} · 💎 ${fmt(c[1])} · ☢️ ${fmt(c[2])}`}
function log(msg,type=''){game.logs.unshift({t:new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}),msg,type});game.logs=game.logs.slice(0,100)}
function build(k){const lvl=game.buildings[k],d=buildingDefs[k],c=cost(d.base,lvl);if(!canPay(c))return log('Ressources insuffisantes.','bad'),render();pay(c);game.buildings[k]++;log(`${d.name} amélioré au niveau ${lvl+1}.`,'good');save();render()}
function research(k){const lvl=game.research[k],d=researchDefs[k],c=cost(d.base,lvl,1.72).map(x=>Math.floor(x*race().research));if(game.buildings.lab<1)return log('Un laboratoire est nécessaire.','bad'),render();if(!canPay(c))return log('Ressources insuffisantes.','bad'),render();pay(c);game.research[k]++;log(`${d.name} atteint le niveau ${lvl+1}.`,'good');save();render()}
function buildShip(k){const d=shipDefs[k],lvl=game.fleet[k],c=d.base.map(x=>Math.floor(x*(1+lvl*.08)));if(game.buildings[d.req[0]]<d.req[1])return log(`${buildingDefs[d.req[0]].name} niveau ${d.req[1]} requis.`,'bad'),render();if(!canPay(c))return log('Ressources insuffisantes.','bad'),render();pay(c);game.fleet[k]++;log(`${d.name} ajouté à la flotte.`,'good');save();render()}
function fleetPower(){let p=0;for(const k in game.fleet)p+=game.fleet[k]*shipDefs[k].power;return p*(1+game.research.weapons*.1)*race().combat}
function defensePower(){return (40+game.buildings.defense*55+game.fleet.fighter*4)*(1+game.research.shield*.1)}
function scout(id){const s=game.systems[id];if(game.fleet.probe<1&&game.fleet.sg<1)return log('Aucune unité d’exploration disponible.','bad'),render();s.scouted=true;log(`Le système ${s.name} a été exploré. Richesse estimée : ${s.rich} %.`,'good');if(s.type==='ruin'&&Math.random()<.45){const loot=[200+s.rich*3,130+s.rich*2,60+s.rich];game.res.metal+=loot[0];game.res.crystal+=loot[1];game.res.naq+=loot[2];log(`Artefacts récupérés : ${costText(loot)}.`,'good')}save();render()}
function colonize(id){const s=game.systems[id],limit=1+game.research.logistics;if(s.type!=='neutral'&&s.type!=='ruin')return;if(!s.scouted)return log('Explore d’abord ce système.','bad'),render();if(game.colonies.length>=limit)return log(`Limite de colonies atteinte (${limit}).`,'bad'),render();const c=[1200,900,500];if(!canPay(c))return log('Il faut 1 200 minerai, 900 cristal et 500 naquadah.','bad'),render();pay(c);s.type='owned';s.owner=game.player.empire;game.colonies.push(id);log(`Nouvelle colonie fondée sur ${s.name}.`,'good');save();render()}
function attack(id){const s=game.systems[id],a=game.ai.find(x=>x.id===s.aiId);if(!a)return;const p=fleetPower()*(.8+Math.random()*.4),e=a.power*(.75+Math.random()*.5);if(p>e){const loot=[Math.floor(a.economy*4),Math.floor(a.economy*2.8),Math.floor(a.economy*1.5)];game.res.metal+=loot[0];game.res.crystal+=loot[1];game.res.naq+=loot[2];a.power=Math.max(20,Math.floor(a.power*.72));a.status='hostile';log(`Victoire contre ${a.name}. Butin : ${costText(loot)}.`,'good')}else{game.fleet.fighter=Math.max(0,game.fleet.fighter-Math.ceil(game.fleet.fighter*.25));game.fleet.cruiser=Math.max(0,game.fleet.cruiser-Math.ceil(game.fleet.cruiser*.18));a.status='hostile';log(`Défaite face à ${a.name}. Une partie de la flotte est perdue.`,'bad')}save();render()}
function aiTurn(notify=true){game.ai.forEach(a=>{a.economy+=2+Math.random()*5;a.power+=1+Math.random()*7;if(Math.random()<.035*a.aggression){const atk=a.power*(.4+Math.random()*.35),def=defensePower();if(atk>def){const steal=Math.min(game.res.metal*.06,250+a.power);game.res.metal-=steal;if(notify)log(`${a.name} a pillé ${fmt(steal)} minerai.`,'bad')}else if(notify)log(`Les défenses ont repoussé un raid de ${a.name}.`,'good')}});if(Math.random()<.05){const a=game.ai[Math.floor(Math.random()*game.ai.length)],b=game.ai[Math.floor(Math.random()*game.ai.length)];if(a!==b){const winner=a.power>b.power?a:b,loser=winner===a?b:a;winner.power+=8;loser.power=Math.max(20,loser.power-10);if(notify)log(`Guerre IA : ${winner.name} prend l’avantage sur ${loser.name}.`,'warn')}}}
function doMission(){if(game.fleet.sg<1)return log('Aucune équipe SG disponible.','bad'),render();const r=Math.random();if(r<.55){const loot=[200+Math.random()*500,120+Math.random()*380,50+Math.random()*230].map(Math.floor);game.res.metal+=loot[0];game.res.crystal+=loot[1];game.res.naq+=loot[2];log(`Mission SG réussie. Ressources : ${costText(loot)}.`,'good')}else if(r<.85){game.res.pop+=80;log('Une civilisation alliée rejoint votre empire : +80 population.','good')}else log('L’équipe SG revient sans découverte majeure.','warn');save();render()}
function renderHeader(){const p=production();$('#where').textContent=`${galaxies[game.player.galaxy].name} · ${game.player.planet}`;$('#identity').innerHTML=`${race().icon} <b>${game.player.empire}</b><br>${game.player.faction}`;$('#resources').innerHTML=[['⛏️','Minerai',game.res.metal,p.metal],['💎','Cristal',game.res.crystal,p.crystal],['☢️','Naquadah',game.res.naq,p.naq],['⚡','Énergie',game.res.energy,p.energy],['👥','Population',game.res.pop,p.pop]].map(x=>`<div class="res"><small>${x[0]} ${x[1]}</small><b>${fmt(x[2])}</b><small>+${x[3].toFixed(1)}/s</small></div>`).join('')}
function renderOverview(){const aiTop=[...game.ai].sort((a,b)=>b.power-a.power).slice(0,4);$('#overview').innerHTML=`<div class="hero"><h2>${race().icon} ${game.player.empire}</h2><p>Dirigeant : <b>${game.player.leader}</b> · Doctrine : <b>${game.player.doctrine}</b></p><p>${race().bonus}</p><div class="actions"><button class="btn good" onclick="doMission()">🌀 Lancer une mission SG</button><button class="btn" onclick="save();log('Partie sauvegardée.','good');render()">💾 Sauvegarder</button><button class="btn bad" onclick="resetGame()">Nouvelle partie</button></div></div><div class="grid"><div class="panel"><h3>État de l’empire</h3><div class="card"><div class="row"><span>Colonies</span><b>${game.colonies.length}</b></div><div class="row"><span>Puissance de flotte</span><b>${fmt(fleetPower())}</b></div><div class="row"><span>Défense planétaire</span><b>${fmt(defensePower())}</b></div><div class="row"><span>Technologies</span><b>${Object.values(game.research).reduce((a,b)=>a+b,0)}</b></div></div></div><div class="panel"><h3>Puissances galactiques</h3>${aiTop.map((a,i)=>`<div class="card"><div class="row"><span>${i+1}. ${races[a.race].icon} ${a.name}</span><b>${fmt(a.power)}</b></div><div class="bar"><i style="width:${Math.min(100,a.power/6)}%"></i></div><small class="muted">${a.worlds} monde(s) · ${a.status}</small></div>`).join('')}</div></div>`}
function renderBuildings(){$('#buildings').innerHTML=`<div class="hero"><h2>🏗️ Infrastructures</h2><p>Développe la planète mère et augmente la production.</p></div><div class="grid">${Object.entries(buildingDefs).map(([k,d])=>{const lvl=game.buildings[k],c=cost(d.base,lvl);return `<div class="panel"><h3>${d.icon} ${d.name}</h3><p class="muted">${d.desc}</p><div class="row"><b>Niveau ${lvl}</b><span class="tag">${costText(c)}</span></div><button class="btn good" ${canPay(c)?'':'disabled'} onclick="build('${k}')">Améliorer</button></div>`}).join('')}</div>`}
function renderResearch(){if(game.buildings.lab<1){$('#research').innerHTML='<div class="hero"><h2>🧪 Recherche</h2><p>Construis d’abord un laboratoire.</p></div>';return}$('#research').innerHTML=`<div class="hero"><h2>🧪 Technologies</h2><p>Les recherches apportent des bonus permanents.</p></div><div class="grid">${Object.entries(researchDefs).map(([k,d])=>{const lvl=game.research[k],c=cost(d.base,lvl,1.72).map(x=>Math.floor(x*race().research));return `<div class="panel"><h3>${d.icon} ${d.name}</h3><p class="muted">${d.desc}</p><div class="row"><b>Niveau ${lvl}</b><span class="tag">${costText(c)}</span></div><button class="btn" ${canPay(c)?'':'disabled'} onclick="research('${k}')">Rechercher</button></div>`}).join('')}</div>`}
function renderFleet(){let ships=Object.entries(shipDefs).map(([k,d])=>{const c=d.base.map(x=>Math.floor(x*(1+game.fleet[k]*.08))),ok=game.buildings[d.req[0]]>=d.req[1];return `<div class="panel"><h3>${d.icon} ${d.name}</h3><p class="muted">Puissance : ${d.power} · Requis : ${buildingDefs[d.req[0]].name} N${d.req[1]}</p><div class="row"><b>Possédés : ${game.fleet[k]}</b><span class="tag">${costText(c)}</span></div><button class="btn" ${ok&&canPay(c)?'':'disabled'} onclick="buildShip('${k}')">Construire</button></div>`}).join('');$('#fleet').innerHTML=`<div class="hero"><h2>🚀 Flotte et unités</h2><p>Puissance totale : <b>${fmt(fleetPower())}</b></p></div><div class="grid">${ships}</div>`}
function renderGalaxy(){const cards=game.systems.map(s=>{const a=s.aiId!==null?game.ai.find(x=>x.id===s.aiId):null;let buttons=s.id===0?'':`<button class="btn small" onclick="scout(${s.id})">📡 Explorer</button>`;if(s.scouted&&(s.type==='neutral'||s.type==='ruin'))buttons+=`<button class="btn small good" onclick="colonize(${s.id})">🏳️ Coloniser</button>`;if(s.scouted&&s.type==='ai')buttons+=`<button class="btn small bad" onclick="attack(${s.id})">⚔️ Attaquer</button>`;return `<div class="system ${s.type==='ai'?'hostile':s.type==='owned'?'owned':'neutral'}"><div class="planet">${s.type==='owned'?'🌍':s.type==='ai'?races[a.race].icon:s.type==='ruin'?'🗿':'🪐'}</div><b>${s.name}</b><div class="muted">Distance ${s.distance} · Porte ${s.gate?'active':'inconnue'}</div><div>${s.scouted?`<span class="tag">${s.type}</span><span class="tag">Richesse ${s.rich}%</span>`:'<span class="tag">Non exploré</span>'}</div><div class="actions">${buttons}</div></div>`}).join('');$('#galaxy').innerHTML=`<div class="hero"><h2>🌌 Carte galactique</h2><p>Explore, espionne, attaque ou colonise les systèmes.</p></div><div class="galaxy">${cards}</div>`}
function renderReports(){$('#reports').innerHTML=`<div class="hero"><h2>📜 Journal galactique</h2><p>Les événements récents de ton empire et des IA.</p></div><div class="panel log">${game.logs.length?game.logs.map(l=>`<div class="logitem ${l.type==='good'?'goodtxt':l.type==='bad'?'badtxt':l.type==='warn'?'warntxt':''}"><b>${l.t}</b> — ${l.msg}</div>`).join(''):'Aucun rapport.'}</div>`}
function render(){renderHeader();renderOverview();renderBuildings();renderResearch();renderFleet();renderGalaxy();renderReports()}
function resetGame(){if(confirm('Supprimer la sauvegarde et recommencer ?')){localStorage.removeItem(SAVE);location.reload()}}
function setupCreator(){const gs=$('#newGalaxy'),rs=$('#newRace');gs.innerHTML=Object.entries(galaxies).map(([k,v])=>`<option value="${k}">${v.name}</option>`).join('');rs.innerHTML=Object.entries(races).map(([k,v])=>`<option value="${k}">${v.icon} ${v.name}</option>`).join('');function update(){const k=rs.value,v=races[k];$('#newFaction').innerHTML=factions[k].map(x=>`<option>${x}</option>`).join('');$('#raceInfo').innerHTML=`<b>${v.icon} ${v.name}</b><br>${v.bonus}`;document.documentElement.style.setProperty('--accent',k==='wraith'?'#7de06f':k==='goauld'?'#ffd66b':k==='ori'?'#ff9b58':k==='replicator'?'#d8e2ea':'#59c8ff')}rs.onchange=update;update();$('#creator').classList.remove('hidden')}
$('#startGame').onclick=()=>{game=fresh();game.created=true;game.player={leader:$('#newLeader').value.trim()||'Dirigeant',empire:$('#newEmpire').value.trim()||'Nouvel Empire',planet:$('#newPlanet').value.trim()||'Monde Prime',galaxy:$('#newGalaxy').value,race:$('#newRace').value,faction:$('#newFaction').value,doctrine:$('#newDoctrine').value};generateUniverse();log(`Fondation de ${game.player.empire} sur ${game.player.planet}.`,'good');save();$('#creator').classList.add('hidden');render()};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#'+b.dataset.page).classList.add('active')});
if(!load())setupCreator();else render();
setInterval(()=>{if(!game.created)return;produce(1);game.tick++;if(game.tick%30===0)aiTurn(true);if(game.tick%10===0)save();renderHeader();if(game.tick%5===0){renderOverview();renderReports()}},1000);
</script>
</body>
</html>
